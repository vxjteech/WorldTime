<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WorldTime</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="brand">
        <span class="brand-name">WorldTime</span>
        <span class="brand-sep">—</span>
        <span id="localClock" class="local-clock">–</span>
      </div>
      <button id="addBtn" class="btn-add">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5">
          <line x1="6" y1="1" x2="6" y2="11"/><line x1="1" y1="6" x2="11" y2="6"/>
        </svg>
        Přidat místo
      </button>
    </div>
  </header>

  <div id="searchOverlay" class="search-overlay hidden">
    <div class="search-box">

      <div class="search-tabs">
        <button class="search-tab active" data-tab="text">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="5.5" cy="5.5" r="4"/><line x1="8.5" y1="8.5" x2="12" y2="12"/>
          </svg>
          Hledat místo
        </button>
        <button class="search-tab" data-tab="map">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M6.5 1C4.567 1 3 2.567 3 4.5c0 3 3.5 7.5 3.5 7.5S10 7.5 10 4.5C10 2.567 8.433 1 6.5 1z"/>
            <circle cx="6.5" cy="4.5" r="1.2"/>
          </svg>
          Vybrat na mapě
        </button>
        <button id="closeSearch" class="close-btn">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5">
            <line x1="1" y1="1" x2="13" y2="13"/><line x1="13" y1="1" x2="1" y2="13"/>
          </svg>
        </button>
      </div>

      <div id="panelText" class="search-panel">
        <input type="text" id="citySearch" placeholder="Praha, Tokyo, New York…" autocomplete="off" spellcheck="false" />
        <div id="cityResults" class="city-results"></div>
      </div>

      <div id="panelMap" class="search-panel hidden">
        <div class="map-picker-hint">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.5" style="flex-shrink:0">
            <circle cx="6.5" cy="6.5" r="5.5"/>
            <line x1="6.5" y1="4" x2="6.5" y2="6.5"/>
            <circle cx="6.5" cy="8.5" r="0.5" fill="currentColor"/>
          </svg>
          Klikni kamkoliv na mapu pro přidání místa
        </div>
        <div id="pickerMap" class="picker-map"></div>
        <div id="pickerStatus" class="picker-status"></div>
      </div>

    </div>
  </div>

  <main id="grid" class="grid">
    <div id="emptyState" class="empty-state">
      <p class="empty-title">Žádná místa</p>
      <p class="empty-hint">Klikni na <strong>+ Přidat místo</strong></p>
    </div>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="cities.js"></script>
  <script src="app.js"></script>
</body>
</html>
